<!DOCTYPE html>
<html>
<head>
    <title>Audinexia - Compliance Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #2563eb;
        }
        pre {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            margin-top: 20px;
        }
        .result {
            margin-top: 20px;
        }
        .compliant { color: #10b981; }
        .partial { color: #eab308; }
        .noncompliant { color: #ef4444; }
        .status-box {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-compliant { background: #10b98120; color: #10b981; }
        .status-partial { background: #eab30820; color: #eab308; }
        .status-noncompliant { background: #ef444420; color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Audinexia Enterprise</h1>
        <p>DPDPA 2023 Compliance Scanner</p>
        
        <input type="file" id="fileInput" accept=".txt">
        <button onclick="uploadFile()">Scan Document</button>
        
        <div id="loading" style="display:none; margin-top:20px;">
            ⏳ Analyzing document...
        </div>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file first');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').innerHTML = '';
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/scan', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                console.log(data);
                
                if (data.success) {
                    displayResults(data);
                } else {
                    document.getElementById('result').innerHTML = `<div style="color: #ef4444;">Error: ${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `<div style="color: #ef4444;">Error: ${error.message}. Make sure backend is running on port 5000.</div>`;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayResults(data) {
            let html = `
                <div style="background: #0f172a; padding: 20px; border-radius: 15px; margin-top: 20px;">
                    <h2>📊 Scan Results</h2>
                    <p><strong>Report ID:</strong> ${data.report_id}</p>
                    <p><strong>Overall Score:</strong> <span style="font-size: 24px; font-weight: bold; color: #3b82f6;">${data.overall_score}%</span></p>
                    
                    <div style="display: flex; gap: 20px; margin: 20px 0;">
                        <div style="background: #10b98120; padding: 15px; border-radius: 10px; flex: 1; text-align: center;">
                            <div style="font-size: 32px; font-weight: bold; color: #10b981;">${data.compliant_count}</div>
                            <div>✓ Compliant</div>
                        </div>
                        <div style="background: #eab30820; padding: 15px; border-radius: 10px; flex: 1; text-align: center;">
                            <div style="font-size: 32px; font-weight: bold; color: #eab308;">${data.partial_count}</div>
                            <div>⚠ Partially Compliant</div>
                        </div>
                        <div style="background: #ef444420; padding: 15px; border-radius: 10px; flex: 1; text-align: center;">
                            <div style="font-size: 32px; font-weight: bold; color: #ef4444;">${data.non_compliant_count}</div>
                            <div>✗ Non-Compliant</div>
                        </div>
                    </div>
                    
                    <h3>📋 Control Details</h3>
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr><th style="text-align: left; padding: 10px; border-bottom: 1px solid #334155;">Control</th>
                                <th style="text-align: left; padding: 10px; border-bottom: 1px solid #334155;">Status</th>
                                <th style="text-align: left; padding: 10px; border-bottom: 1px solid #334155;">Score</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            data.controls.forEach(control => {
                let statusClass = '';
                if (control.status === 'Compliant') statusClass = 'status-compliant';
                else if (control.status === 'Partially Compliant') statusClass = 'status-partial';
                else statusClass = 'status-noncompliant';
                
                html += `
                    <tr>
                        <td style="padding: 10px; border-bottom: 1px solid #334155;">
                            <strong>${control.id}</strong><br>
                            <span style="font-size: 12px; color: #94a3b8;">${control.name}</span>
                        </td>
                        <td style="padding: 10px; border-bottom: 1px solid #334155;">
                            <span class="status-box ${statusClass}">${control.symbol} ${control.status}</span>
                         </td>
                        <td style="padding: 10px; border-bottom: 1px solid #334155;">${control.score}%</td>
                    </tr>
                `;
            });
            
            html += `
                        </tbody>
                    </table>
                    
                    <button onclick="downloadPDF()" style="margin-top: 20px; width: 100%;">📥 Download PDF Report</button>
                </div>
            `;
            
            document.getElementById('result').innerHTML = html;
            window.currentResults = data;
        }
        
        async function downloadPDF() {
            if (!window.currentResults) return;
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Generating PDF...';
            btn.disabled = true;
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/export-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        results: window.currentResults.controls,
                        overall_score: window.currentResults.overall_score,
                        filename: 'policy_document'
                    })
                });
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Audinexia_Report_${window.currentResults.report_id}.pdf`;
                a.click();
                window.URL.revokeObjectURL(url);
                
                alert('✅ PDF Report downloaded!');
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
